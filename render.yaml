# Render Blueprint — CONTAM ERP completo (Frontend + Django + AI Agent)
# Despliegue: Render → New → Blueprint → repo → pegar secretos de render.env.example
#
# Nota: sync: false NO funciona en envVarGroups (Render las ignora).
# Secretos de BD van en contam-django; contam-ai las hereda vía fromService.
envVarGroups:
  - name: contam-db
    envVars:
      - key: DB_PORT
        value: "5432"
      - key: DB_SSLMODE
        value: require

services:
  # ── 1. Django API ────────────────────────────────────────────────────────
  - type: web
    name: contam-django
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/health/
    envVars:
      - fromGroup: contam-db
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false

  # ── 2. AI Agent (Mistral + SUNAT + misma DB) ─────────────────────────────
  - type: web
    name: contam-ai
    runtime: python
    plan: free
    rootDir: ai-agent/server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - fromGroup: contam-db
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: MISTRAL_API_KEY
        sync: false
      - key: MISTRAL_MODEL
        value: mistral-small-latest
      - key: SUNAT_CLIENT_ID
        sync: false
      - key: SUNAT_CLIENT_SECRET
        sync: false
      - key: DB_NAME
        fromService:
          type: web
          name: contam-django
          envVarKey: DB_NAME
      - key: DB_USER
        fromService:
          type: web
          name: contam-django
          envVarKey: DB_USER
      - key: DB_PASSWORD
        fromService:
          type: web
          name: contam-django
          envVarKey: DB_PASSWORD
      - key: DB_HOST
        fromService:
          type: web
          name: contam-django
          envVarKey: DB_HOST

  # ── 3. Frontend ──────────────────────────────────────────────────────────
  - type: web
    name: contam-erp
    runtime: node
    plan: standard
    # Si dist/ ya viene del repo (GitHub Actions), Render solo instala deps de runtime.
    # Si no, intenta compilar aquí con heap ampliado (Standard 2 GB).
    buildCommand: >-
      if [ -f dist/server/index.js ]; then npm ci --omit=dev;
      else npm ci --include=dev && NODE_OPTIONS="--max-old-space-size=1536" npm run build; fi
    startCommand: NODE_ENV=production npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_USE_NEW_SIRE_STRUCTURE
        value: "true"
      - key: VITE_USE_DJANGO_API
        value: "true"
      - key: VITE_ENABLE_PERFORMANCE_MONITORING
        value: "false"
      - key: VITE_API_URL
        fromService:
          type: web
          name: contam-django
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_AI_API_URL
        fromService:
          type: web
          name: contam-ai
          envVarKey: RENDER_EXTERNAL_URL
