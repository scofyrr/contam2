# Compila dist/ en GitHub (7 GB RAM) y lo sube al repo para que Render solo arranque.
# Secrets en GitHub → Settings → Secrets: mismos VITE_* que ya tienes en Render (no cambian).
name: Prebuild dist for Render

on:
  push:
    branches: [main]
    paths-ignore:
      - "dist/**"
      - "**/*.md"

permissions:
  contents: write

concurrency:
  group: render-prebuild-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prebuild:
    name: Build & commit dist/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: https://contam-django.onrender.com
          VITE_AI_API_URL: https://contam-ai.onrender.com
          VITE_USE_DJANGO_API: "true"
          VITE_USE_NEW_SIRE_STRUCTURE: "true"
          VITE_ENABLE_PERFORMANCE_MONITORING: "false"

      - name: Commit dist for Render
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f dist
          git diff --staged --quiet && echo "dist unchanged" && exit 0
          git commit -m "chore: prebuild dist for Render [skip ci]"
          git push
